# ========== DOCKER COMPOSE CONFIGURATION ==========
# Orchestrates the AIandML Platform deployment with ease
# Use: docker-compose up -d (to run in background)

version: '3.8'

services:
  # ========== WEB SERVICE ==========
  # Main nginx server serving the platform
  web:
    container_name: aiandml-platform
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"  # Access at http://localhost:8080
    environment:
      - ENVIRONMENT=production
    restart: unless-stopped
    # Volume mounts for development (uncomment to enable hot reload)
    # volumes:
    #   - .:/usr/share/nginx/html
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ========== OPTIONAL: DOCUMENTATION SERVER ==========
  # Serves additional documentation if needed
  # docs:
  #   image: nginx:alpine
  #   ports:
  #     - "8081:80"
  #   volumes:
  #     - ./docs:/usr/share/nginx/html:ro
  #   restart: unless-stopped

networks:
  default:
    name: aiandml-network
